services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mocktest
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mocktest?schema=public
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 7d
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db

volumes:
  dbdata:
